<h1>Money Machine</h1>
<div class="box">
  <h2>Daily Interest Calculator</h2>
  <h4>Fill out one or more fields</h4>

<form onsubmit="event.preventDefault(); calculate();">

<div class="input-row">

  <div class="input-group">
    <label>Current Bank Balance:</label><br>
    <input type="number" id="balance" placeholder="your current balance">
  </div>

  <div class="input-group">
    <label>Goal Balance</label><br>
    <input id="goal" type="number" placeholder="total bank balance wanted"><br><br>
  </div>

  <div class="input-group">
    <label>Desired Daily Deposit:</label><br>
    <input type="number" id="daily" placeholder="coins wanted per day">
  </div>

</div>

<br>
<button type="submit">Calculate</button>

</form>
</div>

<div class="box">
    <h2>Results</h2>
    <pre id="output">Fill in values and click Calculate.</pre>
</div>
